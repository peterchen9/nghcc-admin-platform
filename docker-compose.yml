name: nghcc-admin-platform

services:
  frontend:
    container_name: nghcc-admin-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-26001}:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - nghcc-admin-network

  backend:
    container_name: nghcc-admin-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      UPLOAD_DIR: /app/uploads
    ports:
      - "${BACKEND_PORT:-26002}:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nghcc-admin-network

  db:
    container_name: nghcc-admin-db
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: ${DB_NAME:-nghcc_admin_platform}
      MYSQL_USER: ${DB_USER:-nghcc_admin}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_me_root_password}
    ports:
      - "${DB_EXTERNAL_PORT:-26003}:3306"
    volumes:
      - nghcc-admin-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${DB_USER:-nghcc_admin} -p${DB_PASSWORD:-change_me_password} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nghcc-admin-network

volumes:
  nghcc-admin-mysql-data:
    name: nghcc-admin-mysql-data

networks:
  nghcc-admin-network:
    name: nghcc-admin-network
